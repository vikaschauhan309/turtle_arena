# Three small pillars in a staggered row -- weave between them rather
# than navigating a single corridor, a different kind of /scan challenge
# than simple_maze's zigzag corridors.
name: obstacle_slalom
dimensions: {width: 10.0, height: 7.5}
walls:
  - {cx: 3.0, cy: 2.5, hx: 0.3, hy: 0.3}
  - {cx: 5.0, cy: 5.0, hx: 0.3, hy: 0.3}
  - {cx: 7.0, cy: 2.5, hx: 0.3, hy: 0.3}
start_zone: {x: 1.0, y: 3.75, radius: 0.4}
goal_zone: {x: 9.5, y: 3.75, radius: 0.4}
